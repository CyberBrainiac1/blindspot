# XcodeGen spec for Blind Spot.
#
# This file lets us GENERATE BlindSpot.xcodeproj from the Swift sources without
# hand-authoring the project. Install XcodeGen and run it (see bootstrap.sh):
#
#     brew install xcodegen
#     xcodegen generate
#     open BlindSpot.xcodeproj
#
# Re-run `xcodegen generate` any time files are added/removed.

name: BlindSpot

options:
  bundleIdPrefix: com.ronakrupani
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true   # mirror the folder structure as Xcode groups

targets:
  BlindSpot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Pull in every file under the BlindSpot/ source folder. Swift files become
    # sources; the bundled fonts under Resources/Fonts become copied resources.
    sources:
      - path: BlindSpot

    # Generate a real Info.plist (kept at repo root, outside the sources folder so
    # it isn't also bundled as a resource). We need a real plist because UIAppFonts
    # (custom font registration) has no INFOPLIST_KEY_ build-setting equivalent.
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Blind Spot
        UILaunchScreen: {}                       # default system launch screen
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

        # Register the bundled custom fonts (filenames only — they're copied to
        # the bundle root). Instrument Serif (display) + JetBrains Mono (telemetry).
        UIAppFonts:
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
          - JetBrainsMono-Bold.ttf
          - JetBrainsMono-ExtraBold.ttf

        # Privacy usage strings (forward-prep; not exercised this milestone).
        NSLocationWhenInUseUsageDescription: "Blind Spot uses your location to map your ride and the hazards you encounter."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Blind Spot uses your location during rides to track your route and detect crashes, even when the screen is off."
        NSMotionUsageDescription: "Blind Spot uses motion data to detect impacts, hard braking, and crashes during your ride."
        NSCameraUsageDescription: "Blind Spot uses the camera to capture photos of road hazards."

    settings:
      base:
        # --- Identity ---
        PRODUCT_BUNDLE_IDENTIFIER: com.ronakrupani.blindspot
        PRODUCT_NAME: BlindSpot
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only

        # --- Signing (your personal team, baked in so regen keeps it) ---
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JAHXMK8F3Y

        # --- Device launch reliability ---
        # Xcode 16+ defaults Debug builds to a "debug dylib": the real executable
        # becomes a tiny stub that loads BlindSpot.debug.dylib via @rpath at
        # launch. With generated projects (XcodeGen) this frequently fails to load
        # on a physical device and the OS SIGKILLs the app in dyld before main()
        # ever runs (black screen → crash). Disabling it makes the main binary a
        # normal, self-contained executable that launches reliably on device.
        # (SwiftUI previews still work.)
        ENABLE_DEBUG_DYLIB: NO
